name: "Gate 09 — Partner Center API Schema"
on:
  workflow_call:
  push:
    branches: [main]
    paths: ['examples/**']
jobs:
  pc-api-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Validate cnabReferences via Partner Center API
        env:
          PC_CLIENT_ID: ${{ secrets.PC_CLIENT_ID }}
          PC_CLIENT_SECRET: ${{ secrets.PC_CLIENT_SECRET }}
          PC_TENANT_ID: ${{ secrets.PC_TENANT_ID }}
          ACR_SUB_ID: ${{ vars.ACR_SUBSCRIPTION_ID }}
          ACR_NAME: ${{ vars.ACR_NAME }}
        run: |
          pip -q install requests pyyaml
          python3 scripts/validate-pc-api.py \
            "${{ inputs.offer_dir || 'examples/ubuntu-starter' }}"
