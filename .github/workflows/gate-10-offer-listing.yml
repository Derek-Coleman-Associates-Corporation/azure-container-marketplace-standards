name: "Gate 10 — Offer Listing + Contacts"
on:
  workflow_call:
  push:
    branches: [main]
jobs:
  offer-listing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Set offer contacts via Partner Center API
        env:
          PC_CLIENT_ID: ${{ secrets.PC_CLIENT_ID }}
          PC_CLIENT_SECRET: ${{ secrets.PC_CLIENT_SECRET }}
          PC_TENANT_ID: ${{ secrets.PC_TENANT_ID }}
        run: |
          pip -q install requests
          python3 scripts/set-offer-contacts.py \
            --support-email "agent@dcassociatesgroup.com" \
            --support-name "DC Associates Agent" \
            --phone "18564484318" \
            --support-url "https://www.dcassociatesgroup.com" \
            --privacy-url "https://www.dcassociatesgroup.com/privacy"
      - name: Validate offer listing completeness
        run: |
          pip -q install requests
          python3 scripts/validate-offer-listing.py
