name: "Gate 04 — createUIDefinition"
on:
  workflow_call:
    inputs:
      offer_dir:
        required: false
        type: string
        default: "examples/ubuntu-starter"
  pull_request:
    paths: ['examples/**']
jobs:
  ui-definition:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate createUIDefinition.json
        run: |
          python3 scripts/validate-ui-definition.py \
            "${{ inputs.offer_dir || 'examples/ubuntu-starter' }}"
